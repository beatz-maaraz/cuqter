name: cuqter
description: "A new Flutter project."
publish_to: 'none'
version: 1.3.41+6

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  firebase_storage: ^13.1.0
  firebase_messaging: ^16.3.0
  cloud_firestore: ^6.1.3
  image_picker: ^1.2.1
  provider: ^6.1.5+1
  flutter_native_splash: ^2.4.7
  http: ^1.2.0
  flutter_launcher_icons: ^0.14.4
  google_generative_ai: ^0.4.6
  shared_preferences: ^2.5.5
  hugeicons: ^1.1.7
  package_info_plus: ^10.1.0
  emoji_picker_flutter: ^4.4.0
  url_launcher: ^6.3.1
  firebase_remote_config: ^6.5.1
  crypto: ^3.0.3
  flutter_local_notifications: ^22.0.1
  file_picker: ^12.0.0-beta.7
  geolocator: ^14.0.3
  video_player: ^2.11.1
  path_provider: ^2.1.2
  share_plus: ^13.2.0
  cached_network_image: ^3.4.1
  go_router: ^17.3.0
  receive_sharing_intent: ^1.9.0
  flutter_webrtc: ^1.5.2
  firebase_database: ^12.4.4
  permission_handler: ^12.0.3
  intl: ^0.20.3
  flutter_ringtone_player: ^4.0.0+4
  open_filex: ^4.7.0
  camera: ^0.11.0+2
  flutter_callkit_incoming: ^3.1.3

dependency_overrides:
  win32: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter_native_splash:
    color: "BDA6CE"
    web: true
    android: true
    ios: true
    branding: "assets/icon/branding.png"
    image: "assets/icon/icon.png"

    android_12: 
      color: "BDA6CE"
      branding: "assets/icon/branding.png"
      image: "assets/icon/icon.png"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#BDA6CE"
  adaptive_icon_foreground: "assets/icon/icon.png"

  web:
    generate: true
    image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  assets:
  