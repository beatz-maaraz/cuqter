<!-- Scripts for dynamic background elements -->
<script>
        const container = document.getElementById('bubble-container');
        const icons = ['forum', 'chat_bubble', 'send', 'alternate_email', 'add_reaction', 'sms', 'notifications', 'thumb_up', 'image', 'mic'];
        const colors = ['text-primary', 'text-secondary', 'text-tertiary'];

        function createBubble() {
            const span = document.createElement('span');
            span.className = 'material-symbols-outlined absolute bubble-float pointer-events-none transition-opacity duration-1000';
            
            const size = Math.floor(Math.random() * 80) + 20;
            const icon = icons[Math.floor(Math.random() * icons.length)];
            const color = colors[Math.floor(Math.random() * colors.length)];
            const opacity = (Math.random() * 0.1) + 0.05;
            
            span.textContent = icon;
            span.style.fontSize = `${size}px`;
            span.classList.add(color);
            span.style.opacity = opacity;
            
            const top = Math.random() * 100;
            const left = Math.random() * 100;
            span.style.top = `${top}%`;
            span.style.left = `${left}%`;
            
            const duration = 15 + Math.random() * 15;
            const delay = Math.random() * -20;
            span.style.animation = `float ${duration}s infinite linear`;
            span.style.animationDelay = `${delay}s`;
            
            container.appendChild(span);
        }

        // Fill background with more subtle icons
        for (let i = 0; i < 20; i++) {
            createBubble();
        }

        // Micro-interaction for input fields
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.classList.add('scale-[1.02]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.classList.remove('scale-[1.02]');
            });
        });
    </script>
